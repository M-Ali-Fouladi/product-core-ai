version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: kalavofor-postgres
    restart: always
    env_file:
      - .env
    volumes:
      - ./postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: kalavofor-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    env_file:
      - .env
    ports:
      - "6379:6379"
  api:
    build: .
    container_name: kalavofor-api
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
  worker:
    build: .
    container_name: kalavofor-worker
    command: celery -A app.workers.celery_app:celery_app worker --loglevel=info
    env_file:
      - .env
    depends_on:
      - redis
      - postgres
    restart: always
